<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CassanovaL — AI Workspace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg: #0e0e10; --surface: #19191c; --surface-lo: #131316;
      --surface-hi: #1f1f23; --surface-hx: #25252a;
      --primary: #4ae176; --primary-d: #38d36a;
      --secondary: #adc6ff; --tertiary: #c180ff;
      --outline: #76757a; --outline-v: #48474c;
      --text: #e7e4ea; --text-v: #acaab0;
      --black: #000000; --accent: #4ae176;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    #root { height: 100vh; overflow: hidden; }

    /* Scrollbar */
    .scroll::-webkit-scrollbar { width: 4px; }
    .scroll::-webkit-scrollbar-track { background: transparent; }
    .scroll::-webkit-scrollbar-thumb { background: var(--surface-hx); border-radius: 10px; }

    /* Animations */
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    @keyframes scaleIn {
      from{opacity:0;transform:scale(0.95) translateY(20px)}
      to{opacity:1;transform:scale(1) translateY(0)}
    }
    @keyframes slideInRight {
      from{transform:translateX(100%)} to{transform:translateX(0)}
    }
    @keyframes msgIn {
      from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)}
    }
    @keyframes dotBounce {
      0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-5px)}
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

    /* Layout */
    .app { display:flex; height:100vh; width:100%; overflow:hidden; background:var(--bg); }

    /* Sidebar */
    .sidebar {
      position:fixed; left:0; top:0; height:100%; width:64px;
      background:var(--black); display:flex; flex-direction:column;
      align-items:center; padding:16px 0; z-index:50;
      border-right:1px solid rgba(72,71,76,0.15);
    }
    .sidebar-logo {
      color:var(--primary); font-weight:900; font-size:20px;
      letter-spacing:-0.05em; margin-bottom:20px;
    }
    .sidebar-agents {
      display:flex; flex-direction:column; gap:4px; flex:1;
      width:100%; align-items:center; overflow-y:auto; padding:0 8px;
    }
    .sidebar-agents::-webkit-scrollbar { display:none; }
    .sidebar-btn {
      position:relative; width:44px; height:44px; border-radius:12px;
      border:none; background:transparent; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      font-size:19px; color:var(--outline);
      transition:color 0.15s, background 0.15s;
    }
    .sidebar-btn:hover { color:white; background:rgba(255,255,255,0.06); }
    .sidebar-btn.active { color:white; }
    .sidebar-btn.active::before {
      content:''; position:absolute; left:-8px; top:50%;
      transform:translateY(-50%); width:2px; height:24px;
      background:var(--accent); border-radius:1px;
    }
    .sidebar-bottom {
      display:flex; flex-direction:column; align-items:center;
      gap:4px; width:100%; padding:0 8px;
    }
    .sidebar-bottom-btn {
      width:44px; height:44px; border-radius:12px; border:none;
      background:transparent; cursor:pointer; display:flex;
      align-items:center; justify-content:center; color:var(--outline);
      font-size:18px; transition:color 0.15s, background 0.15s;
    }
    .sidebar-bottom-btn:hover { color:white; background:rgba(255,255,255,0.06); }
    .avatar-circle {
      width:32px; height:32px; border-radius:50%;
      background:var(--surface-hx); display:flex; align-items:center;
      justify-content:center; font-size:13px; font-weight:700;
      color:white; cursor:pointer; border:1.5px solid rgba(255,255,255,0.1);
    }

    /* Main */
    .main {
      flex:1; margin-left:64px; margin-right:320px;
      display:flex; flex-direction:column; overflow:hidden;
    }

    /* Header */
    .top-header {
      height:52px; z-index:40;
      background:rgba(14,14,16,0.85); backdrop-filter:blur(12px);
      display:flex; justify-content:space-between; align-items:center;
      padding:0 24px; border-bottom:1px solid rgba(72,71,76,0.1);
      flex-shrink:0;
    }
    .header-left { display:flex; align-items:center; gap:16px; }
    .header-agent-info { display:flex; align-items:center; gap:10px; }
    .header-agent-avatar {
      width:32px; height:32px; border-radius:50%;
      background:var(--surface-hx); display:flex; align-items:center;
      justify-content:center; font-size:16px; overflow:hidden; flex-shrink:0;
    }
    .header-agent-avatar img { width:100%; height:100%; object-fit:cover; }
    .header-agent-name { font-size:14px; font-weight:700; color:white; }
    .header-agent-sub {
      font-size:10px; font-family:'JetBrains Mono',monospace;
      color:var(--outline); text-transform:uppercase; letter-spacing:0.1em;
    }
    .active-badge {
      font-size:10px; font-family:'JetBrains Mono',monospace; font-weight:700;
      color:var(--primary); background:rgba(74,225,118,0.1);
      padding:2px 8px; border-radius:100px; border:1px solid rgba(74,225,118,0.2);
    }
    .header-tabs {
      display:flex; gap:3px; background:var(--surface);
      border-radius:100px; padding:3px;
    }
    .header-tab {
      padding:4px 14px; border-radius:100px; font-size:13px;
      font-weight:500; color:var(--text-v); cursor:pointer;
      border:none; background:transparent; transition:all 0.15s;
    }
    .header-tab.active { background:var(--surface-hi); color:white; }
    .header-right { display:flex; align-items:center; gap:6px; }
    .header-icon-btn {
      width:34px; height:34px; border-radius:10px; border:none;
      background:transparent; color:var(--outline); cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:color 0.15s, background 0.15s;
    }
    .header-icon-btn:hover { color:white; background:var(--surface); }

    /* View area */
    .view-area {
      flex:1; overflow:hidden; position:relative;
      background:radial-gradient(ellipse at 50% 30%, rgba(56,211,106,0.04) 0%, transparent 65%);
    }

    /* Chat */
    .chat-view { position:relative; height:100%; display:flex; flex-direction:column; }
    .chat-messages {
      flex:1; overflow-y:auto; padding:32px 32px 200px;
      display:flex; flex-direction:column; gap:28px;
    }
    .msg-agent-row {
      display:flex; align-items:flex-start; gap:12px;
      max-width:800px; animation:msgIn 0.25s ease-out;
    }
    .msg-avatar {
      width:32px; height:32px; border-radius:8px;
      background:var(--surface-hx); border:1px solid rgba(72,71,76,0.1);
      display:flex; align-items:center; justify-content:center;
      font-size:15px; flex-shrink:0; overflow:hidden;
    }
    .msg-avatar img { width:100%; height:100%; object-fit:cover; }
    .msg-bubble-agent {
      background:var(--surface); border-left:3px solid var(--accent);
      border-radius:0 12px 12px 12px; padding:16px 20px;
      font-size:15px; line-height:1.65; color:var(--text);
      box-shadow:0 2px 12px rgba(0,0,0,0.25); flex:1;
    }
    .msg-footer {
      font-family:'JetBrains Mono',monospace; font-size:10px;
      color:var(--outline); margin-top:10px;
    }
    .msg-user-row {
      display:flex; align-items:flex-start; gap:12px;
      max-width:600px; margin-left:auto; flex-direction:row-reverse;
      animation:msgIn 0.25s ease-out;
    }
    .msg-bubble-user {
      border-radius:12px 0 12px 12px; padding:14px 18px;
      font-size:15px; line-height:1.65; color:var(--text);
    }
    .typing-indicator {
      display:flex; align-items:center; gap:10px;
      margin-left:44px; animation:fadeIn 0.2s ease;
    }
    .typing-dots { display:flex; gap:4px; }
    .typing-dot {
      width:6px; height:6px; border-radius:50%;
      animation:dotBounce 1.2s ease-in-out infinite;
    }
    .typing-dot:nth-child(2){animation-delay:0.15s}
    .typing-dot:nth-child(3){animation-delay:0.3s}
    .typing-text { font-size:12px; color:var(--outline); font-style:italic; }

    /* Input */
    .chat-input-area {
      position:absolute; bottom:0; left:0; right:0; padding:0 32px 28px;
      background:linear-gradient(to top, var(--bg) 55%, rgba(14,14,16,0.85) 75%, transparent);
    }
    .chips-row { display:flex; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
    .chip {
      display:flex; align-items:center; gap:6px; padding:5px 12px;
      border-radius:100px; font-size:11px; font-weight:600;
      cursor:pointer; border:none; transition:all 0.15s; white-space:nowrap;
    }
    .input-box {
      background:var(--surface-hi); border:1px solid rgba(72,71,76,0.12);
      border-radius:16px; padding:8px; display:flex; align-items:flex-end;
      gap:6px; box-shadow:0 20px 60px rgba(0,0,0,0.4);
      transition:border-color 0.2s, box-shadow 0.2s;
    }
    .input-box:focus-within {
      border-color:rgba(74,225,118,0.3);
      box-shadow:0 0 0 4px rgba(74,225,118,0.05),0 20px 60px rgba(0,0,0,0.4);
    }
    .input-btn {
      width:40px; height:40px; border-radius:10px; border:none;
      background:transparent; color:var(--outline); cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      flex-shrink:0; transition:color 0.15s;
    }
    .input-btn:hover { color:var(--primary); }
    .input-textarea {
      flex:1; background:transparent; border:none; outline:none;
      color:var(--text); font-family:'Inter',sans-serif; font-size:15px;
      padding:8px 4px; resize:none; max-height:160px; line-height:1.65;
    }
    .input-textarea::placeholder { color:rgba(118,117,122,0.5); }
    .send-btn {
      width:40px; height:40px; border-radius:10px; border:none;
      background:var(--primary); color:#0e0e10; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      flex-shrink:0; transition:filter 0.15s, transform 0.1s;
    }
    .send-btn:hover { filter:brightness(1.1); }
    .send-btn:active { transform:scale(0.92); }
    .send-btn:disabled { opacity:0.4; cursor:not-allowed; }

    /* Dashboard */
    .dashboard-view { padding:40px; max-width:960px; width:100%; margin:0 auto; }
    .dashboard-status {
      font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:700;
      text-transform:uppercase; letter-spacing:0.2em; color:var(--primary-d);
      margin-bottom:6px;
    }
    .dashboard-title {
      font-size:34px; font-weight:800; color:white;
      letter-spacing:-0.03em; margin-bottom:32px;
    }
    .stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:20px; }
    .stat-card {
      position:relative; background:var(--surface-lo); border-radius:16px;
      padding:20px; border:1px solid rgba(72,71,76,0.08); overflow:hidden;
      transition:background 0.15s;
    }
    .stat-card:hover { background:var(--surface-hi); }
    .stat-card-bar { position:absolute; left:0; top:0; width:3px; height:100%; }
    .stat-icon-box {
      width:38px; height:38px; border-radius:10px; border:1px solid rgba(255,255,255,0.05);
      display:flex; align-items:center; justify-content:center;
      font-size:17px; margin-bottom:12px;
    }
    .stat-title {
      font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:700;
      text-transform:uppercase; letter-spacing:0.1em; color:var(--outline); margin-bottom:4px;
    }
    .stat-value { font-size:26px; font-weight:700; color:white; letter-spacing:-0.03em; margin-bottom:4px; }
    .stat-sub { font-size:11px; color:var(--outline); }
    .content-grid { display:grid; grid-template-columns:2fr 1fr; gap:16px; }
    .content-card {
      background:var(--surface-lo); border-radius:16px;
      padding:24px; border:1px solid rgba(72,71,76,0.08);
    }
    .card-title {
      font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:700;
      text-transform:uppercase; letter-spacing:0.15em; color:var(--outline); margin-bottom:16px;
    }
    .activity-item {
      display:flex; align-items:center; gap:12px; padding:10px 0;
      border-bottom:1px solid rgba(72,71,76,0.08);
    }
    .activity-item:last-child { border-bottom:none; }
    .activity-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .activity-text { flex:1; font-size:13px; color:var(--text-v); }
    .activity-time { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--outline); }
    .qa-btn {
      width:100%; display:flex; align-items:center; gap:10px;
      background:var(--surface-hi); border:1px solid rgba(72,71,76,0.1);
      border-radius:10px; padding:12px 14px; color:var(--text);
      font-size:13px; font-weight:500; cursor:pointer;
      transition:background 0.15s; margin-bottom:8px; text-align:left;
    }
    .qa-btn:hover { background:var(--surface-hx); }
    .qa-btn:last-child { margin-bottom:0; }
    .qa-icon {
      width:32px; height:32px; background:var(--bg); border-radius:8px;
      display:flex; align-items:center; justify-content:center;
      font-size:15px; flex-shrink:0;
    }

    /* Right panel */
    .right-panel {
      position:fixed; right:0; top:0; height:100%; width:320px;
      background:var(--surface-lo); z-index:30; display:flex;
      flex-direction:column; padding:24px;
      border-left:1px solid rgba(72,71,76,0.1);
    }
    .panel-header {
      display:flex; justify-content:space-between; align-items:flex-start;
      margin-bottom:20px; flex-shrink:0;
    }
    .panel-title { font-size:13px; font-weight:600; color:var(--primary); }
    .panel-sub {
      font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:700;
      text-transform:uppercase; letter-spacing:0.15em; color:var(--outline); margin-top:2px;
    }
    .panel-scroll { overflow-y:auto; flex:1; }
    .panel-section { margin-bottom:24px; }
    .panel-label {
      font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:700;
      text-transform:uppercase; letter-spacing:0.15em; color:var(--outline);
      margin-bottom:8px; display:flex; align-items:center; justify-content:space-between;
    }
    .panel-badge {
      background:rgba(74,225,118,0.1); color:var(--primary);
      font-size:10px; padding:2px 8px; border-radius:100px;
    }
    .project-card {
      background:var(--surface-hi); border-left:2px solid var(--primary);
      border-radius:10px; padding:12px;
    }
    .project-card-title { font-size:13px; font-weight:600; color:white; margin-bottom:4px; }
    .project-card-sub { font-size:11px; color:var(--text-v); line-height:1.5; }
    .task-item {
      background:var(--surface-hi); border-left:2px solid transparent;
      border-radius:8px; padding:10px 12px; margin-bottom:6px;
      cursor:pointer; transition:all 0.15s;
    }
    .task-item:hover { background:var(--surface-hx); border-left-color:rgba(255,255,255,0.2); }
    .task-item-title { font-size:13px; font-weight:500; color:var(--text); margin-bottom:4px; }
    .task-item-meta {
      font-family:'JetBrains Mono',monospace; font-size:10px;
      color:var(--outline); display:flex; align-items:center; gap:5px;
    }
    .score-card {
      position:relative; background:var(--surface-hi);
      border-radius:10px; padding:16px; overflow:hidden;
    }
    .score-blob {
      position:absolute; right:-16px; top:-16px; width:80px; height:80px;
      background:rgba(74,225,118,0.05); border-radius:50%; filter:blur(20px);
    }
    .score-value { font-size:28px; font-weight:900; color:white; letter-spacing:-0.05em; }
    .score-trend {
      font-family:'JetBrains Mono',monospace; font-size:11px;
      font-weight:700; color:var(--primary); margin-left:8px;
    }
    .score-bar-bg {
      width:100%; height:6px; background:var(--bg);
      border-radius:100px; margin:10px 0 6px;
    }
    .score-bar-fill {
      height:100%; background:var(--primary); border-radius:100px;
      box-shadow:0 0 8px rgba(74,225,118,0.4);
    }
    .score-sub { font-size:10px; color:var(--outline); }
    .memory-item {
      display:flex; align-items:center; gap:10px; padding:7px 8px;
      border-radius:8px; cursor:pointer; transition:background 0.15s;
    }
    .memory-item:hover { background:var(--surface-hi); }
    .memory-text { font-size:12px; color:var(--text-v); }
    .panel-footer {
      border-top:1px solid rgba(72,71,76,0.1); padding-top:12px;
      display:flex; gap:8px; margin-top:8px; flex-shrink:0;
    }
    .panel-footer-btn {
      flex:1; display:flex; flex-direction:column; align-items:center;
      gap:3px; padding:8px; border-radius:8px; border:none;
      background:transparent; cursor:pointer; transition:background 0.15s;
      font-family:'JetBrains Mono',monospace; font-size:9px; font-weight:700;
      text-transform:uppercase; letter-spacing:0.05em;
    }
    .panel-footer-btn:hover { background:var(--surface-hi); }
    .panel-footer-btn.active { color:var(--primary); }
    .panel-footer-btn:not(.active) { color:var(--outline); }

    /* Upload / receipt */
    .drop-zone {
      border:2px dashed rgba(72,71,76,0.3); border-radius:12px;
      padding:20px; text-align:center; cursor:pointer;
      transition:all 0.15s; margin-top:8px;
    }
    .drop-zone:hover { border-color:rgba(74,225,118,0.35); background:rgba(74,225,118,0.04); }
    .drop-text { font-size:12px; color:var(--text-v); }
    .drop-sub { font-size:10px; color:var(--outline); margin-top:4px; font-family:'JetBrains Mono',monospace; }

    /* Command palette */
    .cmd-backdrop {
      position:fixed; inset:0; z-index:100; background:rgba(0,0,0,0.65);
      backdrop-filter:blur(24px); display:flex; align-items:flex-start;
      justify-content:center; padding-top:15vh; animation:fadeIn 0.15s ease;
    }
    .cmd-modal {
      width:100%; max-width:560px; background:var(--surface-lo);
      border-radius:16px; box-shadow:0 32px 128px rgba(0,0,0,0.85);
      overflow:hidden; border:1px solid rgba(255,255,255,0.1);
      animation:scaleIn 0.2s ease-out;
    }
    .cmd-search {
      display:flex; align-items:center; gap:12px; padding:18px 20px;
      background:rgba(31,31,35,0.5); border-bottom:1px solid rgba(255,255,255,0.05);
    }
    .cmd-input {
      flex:1; background:transparent; border:none; outline:none;
      color:var(--text); font-family:'JetBrains Mono',monospace; font-size:16px;
    }
    .cmd-esc {
      font-family:'JetBrains Mono',monospace; font-size:10px;
      color:var(--outline); background:var(--surface-hx);
      padding:3px 7px; border-radius:5px;
    }
    .cmd-results { max-height:400px; overflow-y:auto; padding:8px; }
    .cmd-section-hdr {
      font-family:'JetBrains Mono',monospace; font-size:10px;
      text-transform:uppercase; letter-spacing:0.2em; color:var(--outline);
      padding:8px 12px 4px;
    }
    .cmd-item {
      display:flex; align-items:center; gap:12px; padding:10px 12px;
      border-radius:10px; cursor:pointer; transition:background 0.1s;
    }
    .cmd-item:hover { background:var(--surface-hi); }
    .cmd-item-icon {
      width:36px; height:36px; border-radius:10px; background:var(--bg);
      border:1px solid rgba(255,255,255,0.05); display:flex;
      align-items:center; justify-content:center; font-size:17px;
      flex-shrink:0; transition:transform 0.15s;
    }
    .cmd-item:hover .cmd-item-icon { transform:scale(1.1); }
    .cmd-item-label { font-size:13px; font-weight:600; }
    .cmd-item-sub { font-size:11px; color:var(--outline); }
    .cmd-footer {
      padding:12px 20px; background:rgba(14,14,16,0.8);
      border-top:1px solid rgba(255,255,255,0.05);
      display:flex; align-items:center; justify-content:space-between;
    }
    .cmd-hints { display:flex; gap:14px; }
    .cmd-hint { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--outline); }
    .cmd-ver { font-family:'JetBrains Mono',monospace; font-size:10px; color:rgba(118,117,122,0.4); }

    /* Crew drawer */
    .crew-backdrop {
      position:fixed; inset:0; z-index:60; background:rgba(0,0,0,0.65);
      backdrop-filter:blur(4px); display:flex; justify-content:flex-end;
      animation:fadeIn 0.2s ease;
    }
    .crew-drawer {
      width:100%; max-width:520px; height:100%;
      background:var(--surface-lo);
      box-shadow:-32px 0 128px rgba(0,0,0,0.85);
      border-left:1px solid rgba(255,255,255,0.08);
      display:flex; flex-direction:column;
      animation:slideInRight 0.35s cubic-bezier(0.32,0.72,0,1);
    }
    .crew-header {
      padding:28px 28px 20px; display:flex;
      align-items:flex-start; justify-content:space-between; flex-shrink:0;
    }
    .crew-title-bar {
      width:6px; height:32px; background:var(--tertiary);
      border-radius:3px; box-shadow:0 0 12px rgba(193,128,255,0.4);
      flex-shrink:0;
    }
    .crew-title {
      font-size:22px; font-weight:900; letter-spacing:-0.03em;
      color:white; text-transform:uppercase;
    }
    .crew-sub {
      font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:700;
      text-transform:uppercase; letter-spacing:0.2em; color:var(--outline); margin-top:2px;
    }
    .crew-close {
      width:32px; height:32px; border-radius:50%; border:none;
      background:var(--surface-hi); color:var(--outline); cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      font-size:16px; transition:color 0.15s; flex-shrink:0;
    }
    .crew-close:hover { color:white; }
    .crew-content { flex:1; overflow-y:auto; padding:0 28px 28px; }
    .crew-section { margin-bottom:28px; }
    .crew-label {
      font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:700;
      text-transform:uppercase; letter-spacing:0.15em; color:var(--outline);
      margin-bottom:10px; display:flex; align-items:center; justify-content:space-between;
    }
    .crew-type-row { display:flex; gap:8px; margin-bottom:10px; }
    .crew-type-btn {
      flex:1; padding:10px; border-radius:10px;
      border:1px solid rgba(72,71,76,0.2); background:var(--surface-hi);
      color:var(--text-v); font-size:12px; font-weight:600;
      cursor:pointer; transition:all 0.15s; text-align:center;
    }
    .crew-type-btn.active {
      background:rgba(193,128,255,0.15); border-color:rgba(193,128,255,0.3);
      color:var(--tertiary);
    }
    .crew-textarea {
      width:100%; background:var(--surface-hi);
      border:1px solid rgba(72,71,76,0.2); border-radius:10px;
      padding:12px 14px; color:var(--text); font-family:'Inter',sans-serif;
      font-size:14px; outline:none; resize:vertical; min-height:80px;
      transition:border-color 0.15s;
    }
    .crew-textarea:focus { border-color:rgba(193,128,255,0.4); }
    .crew-select {
      width:100%; background:var(--surface-hi);
      border:1px solid rgba(72,71,76,0.2); border-radius:10px;
      padding:10px 14px; color:var(--text); font-family:'Inter',sans-serif;
      font-size:14px; outline:none; transition:border-color 0.15s;
    }
    .crew-select:focus { border-color:rgba(193,128,255,0.4); }
    .agent-node {
      background:var(--surface-hi); border-radius:14px;
      border-left:4px solid var(--primary); padding:14px 16px;
      display:flex; align-items:center; gap:14px;
      box-shadow:0 4px 20px rgba(0,0,0,0.3); margin-bottom:10px;
      transition:transform 0.2s; cursor:default;
    }
    .agent-node:hover { transform:translateY(-2px); }
    .agent-node-icon {
      width:44px; height:44px; border-radius:10px; background:var(--bg);
      border:1px solid rgba(255,255,255,0.05); display:flex;
      align-items:center; justify-content:center; font-size:22px; flex-shrink:0;
    }
    .agent-node-title {
      font-size:12px; font-weight:900; text-transform:uppercase;
      letter-spacing:0.05em; color:white;
    }
    .agent-node-sub { font-size:11px; color:var(--outline); margin-top:2px; }
    .logs-box {
      background:rgba(0,0,0,0.45); border:1px solid rgba(255,255,255,0.05);
      border-radius:14px; padding:18px; font-family:'JetBrains Mono',monospace;
      font-size:11px; line-height:1.7; height:220px; overflow-y:auto;
    }
    .log-sys { color:var(--primary); }
    .log-info { color:var(--outline-v); }
    .log-analysis { color:#699cff; }
    .log-cursor {
      display:inline-block; width:6px; height:12px;
      background:var(--primary); animation:pulse 1s infinite; vertical-align:middle;
    }
    .crew-footer {
      padding:20px 28px; background:var(--surface-hi);
      border-top:1px solid rgba(255,255,255,0.05); flex-shrink:0;
    }
    .launch-btn {
      width:100%; padding:16px; border-radius:14px; border:none;
      background:linear-gradient(90deg, var(--primary) 0%, var(--primary-d) 50%, var(--primary) 100%);
      color:#0e0e10; font-weight:900; font-size:12px;
      text-transform:uppercase; letter-spacing:0.3em; cursor:pointer;
      box-shadow:0 8px 32px rgba(74,225,118,0.25);
      transition:transform 0.15s, filter 0.15s;
      display:flex; align-items:center; justify-content:center; gap:8px;
    }
    .launch-btn:hover:not(:disabled) { transform:scale(1.02); filter:brightness(1.05); }
    .launch-btn:active:not(:disabled) { transform:scale(0.98); }
    .launch-btn:disabled { opacity:0.5; cursor:not-allowed; }
    .launch-sub {
      text-align:center; font-family:'JetBrains Mono',monospace;
      font-size:10px; color:var(--outline); margin-top:8px; text-transform:uppercase;
    }

    /* Misc */
    .spinner {
      width:14px; height:14px; border:2px solid transparent;
      border-top-color:currentColor; border-radius:50%;
      animation:spin 0.8s linear infinite; flex-shrink:0;
    }
    code {
      font-family:'JetBrains Mono',monospace; background:rgba(0,0,0,0.4);
      padding:2px 6px; border-radius:4px; font-size:0.9em; color:var(--primary);
    }
    pre {
      background:rgba(0,0,0,0.4); border-radius:10px; padding:14px;
      overflow-x:auto; margin:10px 0; border:1px solid rgba(72,71,76,0.1);
    }
    pre code { background:transparent; padding:0; font-size:13px; color:var(--primary-d); }
    .file-input-hidden { display:none; }
    strong { color:var(--text); font-weight:600; }
    em { color:var(--text-v); }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── Agent definitions ────────────────────────────────────────────────────────
const AGENTS = {
  task:     { name:'Alfred',      sub:'Task Manager',     accent:'#4ae176', icon:'✅',
              greeting:'Hello. I\'m Alfred, your task manager. What shall we tackle today?' },
  notes:    { name:'Cicero',      sub:'Knowledge Base',   accent:'#adc6ff', icon:'📝',
              greeting:'Cicero here. What would you like to write or research?' },
  news:     { name:'Najwa',       sub:'News Feed',        accent:'#f59e0b', icon:'📰',
              greeting:'Selamat datang. Najwa Shihab siap. Tanyakan berita apa saja.' },
  coding:   { name:'Linus',       sub:'Code Assistant',   accent:'#c180ff', icon:'💻',
              greeting:'Linus here. Talk is cheap. Show me the code — or describe your problem.' },
  schedule: { name:'Miyamoto',    sub:'Schedule',         accent:'#06b6d4', icon:'📅',
              greeting:'Miyamoto at your service. How shall we command your time today?' },
  budget:   { name:'Mansa',       sub:'Finance',          accent:'#eab308', icon:'💰',
              greeting:'Mansa Musa presides. Let\'s track your wealth — income, expenses, balance.' },
  fitness:  { name:'Lavoiser',    sub:'Fitness & Health', accent:'#ef4444', icon:'🏋',
              greeting:'Lavoiser aktif. Ask me about workouts, nutrition, or your fitness wiki.' },
  journal:  { name:'Dostoyevsky', sub:'Journal',          accent:'#c084fc', icon:'🪞',
              greeting:'Dostoyevsky di sini. Ruang ini aman. Ceritakan apa saja.' },
  davinci:  { name:'Da Vinci',    sub:'Ideas Lab',        accent:'#f97316', icon:'💡',
              greeting:'Leonardo da Vinci hadir. Tidak ada yang mustahil. Ide apa yang kita lahirkan?' },
};
const AGENT_ORDER = ['task','notes','news','coding','schedule','budget','fitness','journal','davinci'];

const CHIPS = {
  task:     ['➕ Add Task','📋 List Pending','✔️ Mark Done','🗑️ Delete'],
  notes:    ['📄 New Note','🔍 Search Notes','📚 Read Last','🔗 Summarize URL'],
  news:     ['📰 Today\'s Briefing','🌍 World News','💼 Business','🔬 Tech'],
  coding:   ['🐛 Debug This','📖 Explain Code','💡 Suggest Fix','📝 Write Tests'],
  schedule: ['📅 Today\'s Events','➕ Add Event','🗓️ This Week','🗑️ Remove Event'],
  budget:   ['💰 Add Expense','📊 Summary','💵 Add Income','📈 This Month'],
  fitness:  ['🏋️ Log Workout','🥗 Track Nutrition','💪 My Progress','📖 Exercise Wiki'],
  journal:  ['📖 Today\'s Entry','💭 Reflect','😤 Vent Mode','📆 Review Week'],
  davinci:  ['💡 Brainstorm','🎨 Creative Brief','🔀 Remix Idea','✨ Random Prompt'],
};

// ── SVG Icons ────────────────────────────────────────────────────────────────
const IcoSend  = () => <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>;
const IcoSearch= () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="15" height="15"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>;
const IcoBell  = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="15" height="15"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>;
const IcoMore  = () => <svg viewBox="0 0 24 24" fill="currentColor" width="15" height="15"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>;
const IcoMax   = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="13" height="13"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>;
const IcoX     = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="15" height="15"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
const IcoClock = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="10" height="10"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
const IcoFile  = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="13" height="13"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>;
const IcoCmd   = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="17" height="17"><path d="M18 3a3 3 0 0 0-3 3v12a3 3 0 0 0 3 3 3 3 0 0 0 3-3 3 3 0 0 0-3-3H6a3 3 0 0 0-3 3 3 3 0 0 0 3 3 3 3 0 0 0 3-3V6a3 3 0 0 0-3-3 3 3 0 0 0-3 3 3 3 0 0 0 3 3h12a3 3 0 0 0 3-3 3 3 0 0 0-3-3z"/></svg>;
const IcoUsers = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="17" height="17"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
const IcoClip  = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="17" height="17"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>;
const IcoRocket= () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="17" height="17"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/></svg>;
const IcoHist  = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="13" height="13"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/></svg>;
const IcoGear  = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="17" height="17"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>;

// ── Utilities ────────────────────────────────────────────────────────────────
const fmtTime = d => new Date(d).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
const fmtDate = s => { if(!s) return ''; return new Date(s).toLocaleDateString('id-ID',{day:'numeric',month:'short'}); };
const fmtMoney = n => {
  if(n==null||isNaN(n)) return '—';
  if(n>=1_000_000) return `${(n/1_000_000).toFixed(1)}M`;
  if(n>=1_000) return `${(n/1_000).toFixed(0)}K`;
  return String(Math.round(n));
};
const renderMd = t => {
  if(!t) return '';
  return t
    .replace(/```[\w]*\n([\s\S]*?)```/g,'<pre><code>$1</code></pre>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g,'<em>$1</em>')
    .replace(/^### (.+)$/gm,'<div style="color:var(--text);font-size:14px;font-weight:700;margin:10px 0 5px">$1</div>')
    .replace(/^## (.+)$/gm,'<div style="color:white;font-size:15px;font-weight:700;margin:12px 0 6px">$1</div>')
    .replace(/^- (.+)$/gm,'<div style="margin:3px 0;padding-left:12px">• $1</div>')
    .replace(/\n\n/g,'<br/><br/>').replace(/\n/g,'<br/>');
};

// ── API ──────────────────────────────────────────────────────────────────────
const apiFetch = async (path, opts={}) => {
  const r = await fetch(path, opts);
  if(!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
};
const chatAPI    = (msg,agent) => apiFetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg,agent})});
const tasksAPI   = () => apiFetch('/api/tasks');
const notesAPI   = () => apiFetch('/api/notes');
const budgetAPI  = () => apiFetch('/api/budget/summary');
const daFilesAPI = () => apiFetch('/api/dataanalyst/files');
const uploadDAAPI= f => { const fd=new FormData();fd.append('file',f);return apiFetch('/api/dataanalyst/upload',{method:'POST',body:fd}); };
const receiptAPI = f => { const fd=new FormData();fd.append('file',f);return apiFetch('/api/budget/scan-receipt',{method:'POST',body:fd}); };
const crewKick   = (topic,crew_type,filename) => apiFetch('/api/crew/kickoff',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({topic,crew_type,filename})});
const crewPoll   = id => apiFetch(`/api/crew/status/${id}`);

// ── Sidebar ──────────────────────────────────────────────────────────────────
function Sidebar({ active, setActive, onCmd, onCrew }) {
  return (
    <aside className="sidebar">
      <div className="sidebar-logo">CL</div>
      <div className="sidebar-agents scroll">
        {AGENT_ORDER.map(k => {
          const ag=AGENTS[k]; const isAct=active===k;
          return (
            <button key={k} className={`sidebar-btn ${isAct?'active':''}`}
              style={isAct?{'--accent':ag.accent}:{}}
              title={`${ag.name} — ${ag.sub}`} onClick={()=>setActive(k)}>
              {ag.icon}
            </button>
          );
        })}
      </div>
      <div className="sidebar-bottom">
        <button className="sidebar-bottom-btn" title="Command Palette (Ctrl+K)" onClick={onCmd}><IcoCmd/></button>
        <button className="sidebar-bottom-btn" title="Crew Mode" onClick={onCrew}><IcoUsers/></button>
        <button className="sidebar-bottom-btn" title="Settings"><IcoGear/></button>
        <div className="avatar-circle" title="Naufal">N</div>
      </div>
    </aside>
  );
}

// ── Header ───────────────────────────────────────────────────────────────────
function Header({ agKey, tab, setTab }) {
  const ag=AGENTS[agKey];
  return (
    <header className="top-header">
      <div className="header-left">
        <div className="header-agent-info">
          <div className="header-agent-avatar">
            <img src={`/static/avatars/${agKey}.jpg`} alt={ag.name}
              onError={e=>{e.target.style.display='none';e.target.parentNode.innerText=ag.icon;}}/>
          </div>
          <div>
            <div className="header-agent-name">{ag.name}</div>
            <div className="header-agent-sub">{ag.sub}</div>
          </div>
          <span className="active-badge" style={{color:ag.accent,background:ag.accent+'1a',borderColor:ag.accent+'33'}}>ONLINE</span>
        </div>
        <div className="header-tabs">
          <button className={`header-tab ${tab==='chat'?'active':''}`} onClick={()=>setTab('chat')}>Chat</button>
          <button className={`header-tab ${tab==='overview'?'active':''}`} onClick={()=>setTab('overview')}>Overview</button>
        </div>
      </div>
      <div className="header-right">
        <button className="header-icon-btn"><IcoSearch/></button>
        <button className="header-icon-btn"><IcoBell/></button>
        <button className="header-icon-btn"><IcoMore/></button>
      </div>
    </header>
  );
}

// ── Chat View ────────────────────────────────────────────────────────────────
function ChatView({ agKey, messages, loading, onSend }) {
  const ag=AGENTS[agKey];
  const [val,setVal]=useState('');
  const endRef=useRef(null); const taRef=useRef(null); const fileRef=useRef(null);

  useEffect(()=>{ endRef.current?.scrollIntoView({behavior:'smooth'}); },[messages,loading]);

  const send=useCallback(()=>{
    const t=val.trim(); if(!t||loading) return;
    setVal('');
    if(taRef.current) taRef.current.style.height='auto';
    onSend(t);
  },[val,loading,onSend]);

  const onKey=e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} };
  const onInput=e=>{
    setVal(e.target.value);
    e.target.style.height='auto';
    e.target.style.height=Math.min(e.target.scrollHeight,160)+'px';
  };

  return (
    <div className="chat-view">
      <div className="chat-messages scroll">
        {messages.length===0&&(
          <div style={{textAlign:'center',padding:'80px 20px',color:'var(--outline)'}}>
            <div style={{fontSize:'52px',marginBottom:'16px'}}>{ag.icon}</div>
            <div style={{fontSize:'22px',fontWeight:'800',color:'white',marginBottom:'10px'}}>{ag.name}</div>
            <div style={{fontSize:'14px',color:'var(--text-v)',maxWidth:'360px',margin:'0 auto',lineHeight:'1.65'}}>{ag.greeting}</div>
          </div>
        )}
        {messages.map((m,i)=>m.role==='user'?(
          <div key={i} className="msg-user-row">
            <div className="msg-avatar" style={{background:'var(--surface-hx)'}}>N</div>
            <div className="msg-bubble-user"
              style={{background:ag.accent+'0c',border:`1px solid ${ag.accent}18`}}
              dangerouslySetInnerHTML={{__html:renderMd(m.content)}}/>
          </div>
        ):(
          <div key={i} className="msg-agent-row">
            <div className="msg-avatar">
              <img src={`/static/avatars/${agKey}.jpg`} alt={ag.name}
                onError={e=>{e.target.style.display='none';e.target.parentNode.innerText=ag.icon;}}/>
            </div>
            <div className="msg-bubble-agent" style={{borderLeftColor:ag.accent}}>
              <div dangerouslySetInnerHTML={{__html:renderMd(m.content)}}/>
              <div className="msg-footer">SYSTEM: READY · {m.ts?fmtTime(m.ts):''}</div>
            </div>
          </div>
        ))}
        {loading&&(
          <div className="typing-indicator">
            <div className="typing-dots">
              {[0,1,2].map(i=><div key={i} className="typing-dot"
                style={{background:ag.accent+'70',animationDelay:i*150+'ms'}}/>)}
            </div>
            <span className="typing-text">{ag.name} is thinking…</span>
          </div>
        )}
        <div ref={endRef}/>
      </div>
      <div className="chat-input-area">
        <div className="chips-row">
          {(CHIPS[agKey]||[]).map((c,i)=>(
            <button key={i} className="chip" onClick={()=>onSend(c.replace(/^[^\s]+\s/,''))}
              style={i===0
                ?{background:ag.accent+'1f',color:ag.accent,border:`1px solid ${ag.accent}33`}
                :{background:'var(--surface-hi)',color:'var(--text-v)',border:'1px solid rgba(72,71,76,0.12)'}}>
              {c}
            </button>
          ))}
        </div>
        <div className="input-box">
          <button className="input-btn" onClick={()=>fileRef.current?.click()}><IcoClip/></button>
          <input ref={fileRef} type="file" className="file-input-hidden"
            onChange={e=>{if(e.target.files[0])onSend(`[File: ${e.target.files[0].name}]`);}}/>
          <textarea ref={taRef} className="input-textarea" rows="1"
            placeholder={`Message ${ag.name}…`} value={val}
            onChange={onInput} onKeyDown={onKey}/>
          <button className="send-btn" onClick={send} disabled={!val.trim()||loading}>
            {loading?<div className="spinner"/>:<IcoSend/>}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Crew Drawer ───────────────────────────────────────────────────────────────
function CrewDrawer({ onClose }) {
  const [crewType,setCrewType]=useState('research');
  const [topic,setTopic]=useState('');
  const [filename,setFilename]=useState('');
  const [daFiles,setDAFiles]=useState([]);
  const [status,setStatus]=useState('idle');
  const [logs,setLogs]=useState([]);
  const [outputs,setOutputs]=useState({});
  const logsEndRef=useRef(null);
  const pollRef=useRef(null);

  useEffect(()=>{
    daFilesAPI().then(d=>setDAFiles(d.files||[])).catch(()=>{});
    return()=>{if(pollRef.current)clearInterval(pollRef.current);};
  },[]);

  useEffect(()=>{ logsEndRef.current?.scrollIntoView({behavior:'smooth'}); },[logs]);

  const launch=async()=>{
    if(!topic.trim()) return;
    if(crewType==='dataanalyst'&&!filename) return;
    setStatus('running');setLogs(['[SYSTEM] Initializing crew pipeline…']);setOutputs({});
    try{
      const res=await crewKick(topic.trim(),crewType,crewType==='dataanalyst'?filename:undefined);
      const id=res.job_id;
      pollRef.current=setInterval(async()=>{
        try{
          const s=await crewPoll(id);
          if(s.logs?.length) setLogs(s.logs);
          if(s.status==='done'){
            clearInterval(pollRef.current);setStatus('done');setOutputs(s.outputs||{});
            setLogs(p=>[...p,'[SYSTEM] ✅ Pipeline completed.']);
          }else if(s.status==='error'){
            clearInterval(pollRef.current);setStatus('error');
            setLogs(p=>[...p,`[ERROR] ${(s.error||'Unknown').split('\n')[0]}`]);
          }
        }catch{}
      },2500);
    }catch(e){
      setStatus('error');setLogs(p=>[...p,`[ERROR] ${e.message}`]);
    }
  };

  const nodes=crewType==='research'
    ?[{icon:'🔬',title:'Ibnu Al-Haytham',sub:'Deep Research Specialist',color:'#4ae176'},
      {icon:'✍️',title:'Narator & Penulis',sub:'Content Writer',color:'#c180ff'}]
    :[{icon:'🧹',title:'Data Cleaner',sub:'Preprocessing Agent',color:'#4ae176'},
      {icon:'📊',title:'Statistician',sub:'Analysis Expert',color:'#adc6ff'},
      {icon:'📈',title:'Visualizer',sub:'Chart Generator',color:'#f97316'}];

  const logClass=l=>l.startsWith('[SYSTEM]')||l.startsWith('[ERROR]')?'log-sys':l.includes('>>')||l.includes('→')?'log-analysis':'log-info';

  return (
    <div className="crew-backdrop" onClick={onClose}>
      <div className="crew-drawer" onClick={e=>e.stopPropagation()}>
        <div className="crew-header">
          <div style={{display:'flex',alignItems:'flex-start',gap:'12px'}}>
            <div className="crew-title-bar"/>
            <div><div className="crew-title">Crew Mode</div><div className="crew-sub">Multi-Agent Pipeline</div></div>
          </div>
          <button className="crew-close" onClick={onClose}><IcoX/></button>
        </div>
        <div className="crew-content scroll">
          <div className="crew-section">
            <div className="crew-label">Pipeline Type</div>
            <div className="crew-type-row">
              <button className={`crew-type-btn ${crewType==='research'?'active':''}`} onClick={()=>setCrewType('research')}>🔬 Research</button>
              <button className={`crew-type-btn ${crewType==='dataanalyst'?'active':''}`} onClick={()=>setCrewType('dataanalyst')}>📊 Data Analyst</button>
            </div>
            {crewType==='research'?(
              <>
                <div className="crew-label" style={{marginTop:'12px'}}>Research Topic</div>
                <textarea className="crew-textarea" placeholder="Enter topic or research question…"
                  value={topic} onChange={e=>setTopic(e.target.value)}/>
              </>
            ):(
              <>
                <div className="crew-label" style={{marginTop:'12px'}}>Dataset File</div>
                <select className="crew-select" value={filename} onChange={e=>setFilename(e.target.value)}>
                  <option value="">Select a file…</option>
                  {daFiles.map((f,i)=><option key={i} value={f.name}>{f.name} ({f.size_kb} KB)</option>)}
                </select>
                <div style={{marginTop:'10px'}}>
                  <div className="crew-label">Analysis Goal</div>
                  <textarea className="crew-textarea" placeholder="What do you want to analyze?"
                    value={topic} onChange={e=>setTopic(e.target.value)}/>
                </div>
              </>
            )}
          </div>
          <div className="crew-section">
            <div className="crew-label">
              Node Topology
              <span style={{color:'var(--primary)',fontSize:'11px',display:'flex',alignItems:'center',gap:'5px'}}>
                <span style={{width:'6px',height:'6px',borderRadius:'50%',display:'inline-block',
                  background:status==='running'?'var(--primary)':'#48474c',
                  animation:status==='running'?'pulse 1s infinite':'none'}}/>
                {nodes.length} Agents
              </span>
            </div>
            {nodes.map((n,i)=>(
              <div key={i} className="agent-node" style={{borderLeftColor:n.color}}>
                <div className="agent-node-icon">{n.icon}</div>
                <div style={{flex:1}}>
                  <div className="agent-node-title">{n.title}</div>
                  <div className="agent-node-sub">{n.sub}</div>
                </div>
                {status==='done'&&<span style={{color:'var(--primary)',fontSize:'16px'}}>✓</span>}
              </div>
            ))}
          </div>
          <div className="crew-section">
            <div className="crew-label">System Logs</div>
            <div className="logs-box scroll">
              {logs.length===0?<span style={{color:'var(--outline)'}}>{'> Awaiting launch…'}</span>
                :logs.map((l,i)=><div key={i} className={logClass(l)}>{l}</div>)}
              {status==='running'&&<span className="log-cursor"/>}
              <div ref={logsEndRef}/>
            </div>
          </div>
          {Object.keys(outputs).length>0&&(
            <div className="crew-section">
              <div className="crew-label">Outputs</div>
              {Object.entries(outputs).map(([fn,content],i)=>(
                <div key={i} style={{marginBottom:'10px'}}>
                  <div style={{fontFamily:'JetBrains Mono',fontSize:'11px',color:'var(--secondary)',marginBottom:'4px'}}>{fn}</div>
                  <div style={{background:'rgba(0,0,0,0.4)',border:'1px solid rgba(255,255,255,0.05)',borderRadius:'10px',
                    padding:'12px',fontFamily:'JetBrains Mono',fontSize:'11px',color:'var(--text-v)',
                    maxHeight:'180px',overflowY:'auto',whiteSpace:'pre-wrap'}}>
                    {content}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
        <div className="crew-footer">
          <button className="launch-btn" onClick={launch}
            disabled={status==='running'||!topic.trim()||(crewType==='dataanalyst'&&!filename)}>
            {status==='running'?<><div className="spinner"/>Running pipeline…</>:<><IcoRocket/>Launch Crew Pipeline</>}
          </button>
          <div className="launch-sub">
            {status==='done'?'✅ PIPELINE COMPLETED':status==='error'?'❌ PIPELINE FAILED':'Estimated 1–3 min · Mistral LLM'}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [agKey,setAgKey]=useState('task');
  const [tab,setTab]=useState('chat');
  const [msgs,setMsgs]=useState(()=>Object.fromEntries(AGENT_ORDER.map(k=>[k,[]])));
  const [loading,setLoad]=useState(false);
  const [showCmd,setShowCmd]=useState(false);
  const [showCrew,setShowCrew]=useState(false);
  const [dash,setDash]=useState({tStats:null,tasks:[],budget:null,notes:[],notesTotal:0,recentTx:[]});

  useEffect(()=>{ document.documentElement.style.setProperty('--accent',AGENTS[agKey].accent); },[agKey]);

  const loadDash=useCallback(()=>{
    Promise.all([tasksAPI(),notesAPI(),budgetAPI()])
      .then(([t,n,b])=>setDash({
        tStats:t.stats,tasks:t.tasks??[],budget:b,
        notes:n.notes??[],notesTotal:n.total??0,
        recentTx:b?.recent_transactions??[],
      })).catch(()=>{});
  },[]);

  useEffect(()=>{ loadDash(); const iv=setInterval(loadDash,30000); return()=>clearInterval(iv); },[loadDash]);

  useEffect(()=>{
    const h=e=>{
      if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();setShowCmd(p=>!p);}
      if(e.key==='Escape'){setShowCmd(false);setShowCrew(false);}
    };
    window.addEventListener('keydown',h);
    return()=>window.removeEventListener('keydown',h);
  },[]);

  const send=useCallback(async text=>{
    const ts=new Date().toISOString();
    setMsgs(p=>({...p,[agKey]:[...p[agKey],{role:'user',content:text,ts}]}));
    setLoad(true);
    try{
      const r=await chatAPI(text,agKey);
      setMsgs(p=>({...p,[agKey]:[...p[agKey],{role:'assistant',content:r.response,ts:new Date().toISOString()}]}));
    }catch(e){
      setMsgs(p=>({...p,[agKey]:[...p[agKey],{role:'assistant',content:`⚠️ ${e.message}. Make sure backend is running at localhost:8000.`,ts:new Date().toISOString()}]}));
    }
    setLoad(false);
    loadDash();
  },[agKey,loadDash]);

  const switchAgent=k=>{setAgKey(k);setTab('chat');};

  return (
    <div className="app">
      <Sidebar active={agKey} setActive={switchAgent} onCmd={()=>setShowCmd(true)} onCrew={()=>setShowCrew(true)}/>
      <main className="main">
        <Header agKey={agKey} tab={tab} setTab={setTab}/>
        <div className="view-area">
          {tab==='chat'
            ?<ChatView agKey={agKey} messages={msgs[agKey]} loading={loading} onSend={send}/>
            :<DashboardView dash={dash}/>}
        </div>
      </main>
      <RightPanel agKey={agKey} dash={dash}/>
      {showCmd&&<CommandPalette onClose={()=>setShowCmd(false)} setAgent={switchAgent} setTab={setTab}/>}
      {showCrew&&<CrewDrawer onClose={()=>setShowCrew(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
