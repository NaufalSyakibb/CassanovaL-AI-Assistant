<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>CassanovaL</title>
  <!-- Pixel fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Nunito:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* ── PIXEL THEME (default) ─────────────────────────────── */
    :root {
      --bg0:#0a0a0f; --bg1:#111118; --bg2:#1a1a28; --bg3:#252538;
      --bd0:#2a2a40; --bd1:#3a3a55;
      --t0:#e8e8f0;  --t1:#9090b0;  --t2:#505068;
      --grn:#00ff41; --amb:#ffaa00; --blu:#4499ff;
      --prp:#bb44ff; --cyn:#00ffcc; --gld:#ffcc00; --red:#ff2244;
      --journal:#c084fc; --davinci:#ff9900;
      /* layout */
      --font-px:'Press Start 2P',monospace;
      --font-mono:'VT323',monospace;
      --font-code:'VT323',monospace;
      --radius:0px; --radius-sm:0px; --radius-xs:0px;
      --shadow:2px 2px 0 0 rgba(0,0,0,.5);
      --shadow-md:3px 3px 0 0 rgba(0,0,0,.4);
      --shadow-lg:4px 4px 0 0 rgba(0,0,0,.6);
      --px-font-size-px:6px;
      --px-font-size-label:5px;
    }

    /* ── CASUAL THEME ──────────────────────────────────────── */
    html.casual {
      --bg0:#fdf6ee; --bg1:#fff9f2; --bg2:#f5ede0; --bg3:#ede3d2;
      --bd0:#e2d4be; --bd1:#cfc0a4;
      --t0:#3d2e1e;  --t1:#7a6248;  --t2:#b09070;
      --grn:#52b04a; --amb:#e8892f; --blu:#4488cc;
      --prp:#8855bb; --cyn:#3aa898; --gld:#d4a520; --red:#d04f35;
      --journal:#9b72cf; --davinci:#cc7700;
      /* layout */
      --font-px:'Nunito',sans-serif;
      --font-mono:'Nunito',sans-serif;
      --font-code:'JetBrains Mono',monospace;
      --radius:16px; --radius-sm:10px; --radius-xs:6px;
      --shadow:0 4px 16px rgba(0,0,0,.08);
      --shadow-md:0 6px 24px rgba(0,0,0,.1);
      --shadow-lg:0 8px 32px rgba(0,0,0,.12);
      --px-font-size-px:13px;
      --px-font-size-label:11px;
    }

    *{box-sizing:border-box;margin:0;padding:0;}
    html,body,#root{width:100%;height:100%;overflow:hidden;}
    html:not(.casual){image-rendering:pixelated;image-rendering:crisp-edges;}
    body{background:var(--bg0);color:var(--t0);font-family:var(--font-mono);font-size:18px;transition:background .3s,color .3s;}
    html.casual body{font-size:15px;image-rendering:auto;}

    /* Pixel scanlines — hidden in casual */
    body::after{content:'';position:fixed;inset:0;
      background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.07) 2px,rgba(0,0,0,.07) 4px);
      pointer-events:none;z-index:9999;}
    html.casual body::after{display:none;}

    ::-webkit-scrollbar{width:8px;}
    ::-webkit-scrollbar-track{background:var(--bg1);}
    ::-webkit-scrollbar-thumb{background:var(--bd1);border:2px solid var(--bg1);border-radius:var(--radius-xs);}
    ::-webkit-scrollbar-thumb:hover{background:var(--t2);}

    /* ── Shared component classes ── */
    .px-btn{
      font-family:var(--font-px);font-size:var(--px-font-size-px);
      border:2px solid;cursor:pointer;border-radius:var(--radius-sm);
      transition:transform 0.1s,box-shadow 0.1s,background 0.15s;
    }
    html:not(.casual) .px-btn:hover{transform:translate(-1px,-1px);box-shadow:3px 3px 0 0 rgba(0,0,0,.6);}
    html:not(.casual) .px-btn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 0 rgba(0,0,0,.6);}
    html.casual .px-btn:hover{transform:translateY(-1px);box-shadow:var(--shadow-md);}
    html.casual .px-btn:active{transform:translateY(0);}
    .px-btn:disabled{opacity:.4;cursor:not-allowed;transform:none !important;box-shadow:none !important;}

    .px-stat{background:var(--bg2);border:2px solid var(--bd0);
      box-shadow:var(--shadow);padding:10px 12px;border-radius:var(--radius-sm);}
    .px-label{font-family:var(--font-px);font-size:var(--px-font-size-label);
      letter-spacing:.08em;text-transform:uppercase;color:var(--t2);}
    html.casual .px-label{letter-spacing:.04em;}
    .px-tag{font-family:var(--font-px);font-size:var(--px-font-size-label);
      padding:3px 8px;border:1px solid;border-radius:var(--radius-xs);}

    .quick-btn{font-family:var(--font-mono);font-size:16px;padding:6px 10px;border:2px solid;
      cursor:pointer;text-align:left;width:100%;background:transparent;
      border-radius:var(--radius-sm);transition:filter .1s,transform .1s;}
    html:not(.casual) .quick-btn:hover{filter:brightness(1.4);transform:translateX(3px);}
    html.casual .quick-btn:hover{filter:brightness(0.95);transform:translateY(-1px);box-shadow:var(--shadow);}

    .agent-nav-item{transition:transform .1s;}
    html:not(.casual) .agent-nav-item:hover{transform:translateY(-3px);}
    html.casual .agent-nav-item:hover{transform:translateX(3px);}

    .dither-bg{background-image:radial-gradient(circle,rgba(255,255,255,.025) 1px,transparent 1px);background-size:4px 4px;}
    html.casual .dither-bg{background-image:none;}

    .blink{animation:blink 1s step-end infinite;}
    @keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
    .type-dot{animation:tdot 1.2s step-end infinite;}
    .type-dot:nth-child(2){animation-delay:.4s;}
    .type-dot:nth-child(3){animation-delay:.8s;}
    @keyframes tdot{0%,66%,100%{opacity:0;}33%{opacity:1;}}
    html.casual .type-dot{animation:tdot-c 1.4s ease-in-out infinite;border-radius:50%;}
    @keyframes tdot-c{0%,100%{transform:scale(.6);opacity:.3;}50%{transform:scale(1);opacity:1;}}
    html.casual .type-dot:nth-child(2){animation-delay:.2s;}
    html.casual .type-dot:nth-child(3){animation-delay:.4s;}

    .msg-in{animation:msgIn .15s ease both;}
    @keyframes msgIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}

    .msg-content pre{background:#080810;border:2px solid var(--bd0);border-left:4px solid var(--prp);
      padding:12px;overflow-x:auto;font-family:var(--font-code);font-size:16px;line-height:1.5;
      margin:8px 0;box-shadow:var(--shadow);border-radius:var(--radius-xs);}
    html.casual .msg-content pre{background:#f0e8f8;border-left:4px solid var(--prp);color:#3d2e1e;}
    .msg-content code{background:var(--bg2);border:1px solid var(--bd0);padding:1px 6px;
      font-family:var(--font-code);font-size:16px;color:var(--cyn);border-radius:var(--radius-xs);}
    html.casual .msg-content code{color:var(--prp);}
    .msg-content ul{padding-left:20px;margin:6px 0;list-style:square;}
    html.casual .msg-content ul{list-style:disc;}
    .msg-content li{margin:4px 0;}
    .msg-content strong{color:var(--gld);}
    html.casual .msg-content strong{color:var(--amb);}
    .msg-content p{margin:4px 0;line-height:1.5;}

    /* Theme toggle button — z-index must exceed scanlines (9999) */
    .theme-toggle{
      position:fixed;bottom:24px;right:24px;z-index:100000;
      width:48px;height:48px;border-radius:50%;
      border:2px solid var(--bd1);background:var(--bg2);
      cursor:pointer;font-size:20px;
      box-shadow:var(--shadow-md);
      display:flex;align-items:center;justify-content:center;
      transition:transform .2s,box-shadow .2s,background .3s;
      outline:none;
    }
    .theme-toggle:hover{transform:scale(1.12);box-shadow:var(--shadow-lg);}
    .theme-toggle:active{transform:scale(0.96);}

    #conn-banner{
      position:fixed;top:0;left:0;right:0;z-index:99999;
      background:#ff2244;border-bottom:3px solid #ff6666;
      font-family:var(--font-px);font-size:8px;
      color:#fff;text-align:center;padding:10px;
      display:none;line-height:2;
    }
    html.casual #conn-banner{border-radius:0 0 var(--radius-sm) var(--radius-sm);font-size:12px;}
  </style>
</head>
<body>
  <div id="conn-banner">
    CANNOT CONNECT TO BACKEND &nbsp;|&nbsp;
    RUN: python server.py &nbsp;|&nbsp;
    THEN OPEN: http://localhost:8000
  </div>
  <div id="err-banner" style="display:none;position:fixed;top:0;left:0;right:0;z-index:999999;
    background:#220000;border-bottom:3px solid #ff2244;color:#ff6666;padding:12px 16px;
    font-family:monospace;font-size:13px;white-space:pre-wrap;word-break:break-all;"></div>
  <div id="root"></div>

  <script>
    window.onerror = function(msg,src,line,col,err){
      var b=document.getElementById('err-banner');
      b.style.display='block';
      b.textContent='JS ERROR: '+msg+'\nat '+src+':'+line+':'+col;
    };
    window.onunhandledrejection=function(e){
      var b=document.getElementById('err-banner');
      b.style.display='block';
      b.textContent='UNHANDLED PROMISE: '+(e.reason&&(e.reason.message||e.reason));
    };
  </script>

      !window.location.origin

    async function checkConnection(){
      try{
        const ctrl=new AbortController();
        const timer=setTimeout(()=>ctrl.abort(),4000);
        const r=await fetch(`${API}/api/tasks`,{signal:ctrl.signal});
        clearTimeout(timer);
        document.getElementById('conn-banner').style.display=r.ok?'none':'block';
      }catch(e){
        document.getElementById('conn-banner').style.display='block';
      }
    }
    checkConnection();
    setInterval(checkConnection,15000);

    function formatRp(n){ return 'Rp '+Number(n).toLocaleString('id-ID'); }

    function renderContent(text){
      if(text===null||text===undefined||text==='')return null;
      if(typeof text!=='string')text=String(text);
      const blocks=text.split(/(```[\s\S]*?```)/g);
      return blocks.map((block,i)=>{
        if(!block)return null;
        if(block.startsWith('```')&&block.endsWith('```')){
          const inner=block.slice(3,-3).replace(/^[a-z]+\n/,'');
          return <pre key={i}>{inner}</pre>;
        }
        const lines=block.split('\n');
        return(
          <span key={i}>
            {lines.map((line,j)=>{
              const parts=line.split(/(\*\*[^*]+\*\*|`[^`]+`)/g);
              return(
                <React.Fragment key={j}>
                  {parts.map((p,k)=>{
                    if(p.startsWith('**')&&p.endsWith('**'))return<strong key={k}>{p.slice(2,-2)}</strong>;
                    if(p.startsWith('`')&&p.endsWith('`'))return<code key={k}>{p.slice(1,-1)}</code>;
                    return p;
                  })}
                  {j<lines.length-1&&<br/>}
                </React.Fragment>
              );
            })}
          </span>
        );
      });
    }

    // ── Helpers ───────────────────────────────────────────────────────────────────
    function todayISO(){return new Date().toISOString().slice(0,10);}

    function groupByDate(msgs){
      const groups=[];
      for(const msg of msgs){
        const d=msg.date||todayISO();
        if(!groups.length||groups[groups.length-1].date!==d){
          groups.push({date:d,msgs:[msg]});
        }else{
          groups[groups.length-1].msgs.push(msg);
        }
      }
      return groups;
    }

    function formatDateLabel(iso){
      const today=todayISO();
      const yesterday=new Date(Date.now()-86400000).toISOString().slice(0,10);
      if(iso===today)return'HARI INI';
      if(iso===yesterday)return'KEMARIN';
      const d=new Date(iso+'T00:00:00');
      return d.toLocaleDateString('id-ID',{weekday:'short',day:'2-digit',month:'short',year:'numeric'}).toUpperCase();
    }

    // ── Theme toggle button (rendered via portal → always on top, never clipped) ──
    function ThemeToggle({theme,onToggle}){
      const btn=(
        <button
          className="theme-toggle"
          onClick={onToggle}
          title={theme==='pixel'?'Switch to Casual theme 🌸':'Switch to Pixel theme 👾'}
        >
          {theme==='pixel'?'🌸':'👾'}
        </button>
      );
      // Portal renders directly into document.body — escapes every overflow:hidden
      return ReactDOM.createPortal(btn, document.body);
    }

    // ── App ───────────────────────────────────────────────────────────────────────
    function App(){
      const [theme,setTheme]=useState(()=>localStorage.getItem('cassanoval-theme')||'pixel');
      const [activeAgent,setActiveAgent]=useState('task');
      const T=theme==='pixel'?T_PIXEL:T_CASUAL;
      const C=theme==='pixel'?C_PIXEL:C_CASUAL;
      const AGENTS=getAgents(C);
      const SP=getSP(C);

      // Apply theme class to <html>
      useEffect(()=>{
        document.documentElement.className=theme==='casual'?'casual':'';
        localStorage.setItem('cassanoval-theme',theme);
      },[theme]);

      const [messagesByAgent,setMessagesByAgent]=useState(()=>{
        const init={};
        AGENT_ORDER.forEach(id=>{
          const agents=getAgents(C_PIXEL);
          init[id]=[{
            id:Date.now()+id,role:'agent',agent:id,
            content:agents[id].greeting,
            time:new Date().toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'}),
            date:todayISO(),
          }];
        });
        return init;
      });

      const [isLoading,setIsLoading]=useState(false);
      const [panelData,setPanelData]=useState({tasks:{},notes:{},budget:{}});
      const [pendingReceipt,setPendingReceipt]=useState(null);
      const [isScanningReceipt,setIsScanningReceipt]=useState(false);
      const bottomRef=useRef(null);
      const messages=messagesByAgent[activeAgent]||[];

      useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:'smooth'});},[messages,isLoading]);

      const fetchPanelData=useCallback(async(agent)=>{
        try{
          if(agent==='task'){
            const d=await(await fetch(`${API}/api/tasks`)).json();
            setPanelData(p=>({...p,tasks:d}));
          }else if(agent==='notes'){
            const d=await(await fetch(`${API}/api/notes`)).json();
            setPanelData(p=>({...p,notes:d}));
          }else if(agent==='budget'){
            const d=await(await fetch(`${API}/api/budget/summary`)).json();
            setPanelData(p=>({...p,budget:d}));
          }
        }catch(e){console.error('Panel fetch failed:',e);}
      },[]);

      useEffect(()=>{fetchPanelData(activeAgent);},[activeAgent,fetchPanelData]);

      async function sendMessage(text){
        if(isLoading)return;
        const userMsg={id:Date.now(),role:'user',content:text,
          time:new Date().toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'}),
          date:todayISO()};
        setMessagesByAgent(prev=>({...prev,[activeAgent]:[...(prev[activeAgent]||[]),userMsg]}));
        setIsLoading(true);
        try{
          const res=await fetch(`${API}/api/chat`,{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({message:text,agent:activeAgent}),
          });
          const data=await res.json();
          if(!res.ok)throw new Error(data.detail||'Server error');
          const agentMsg={id:Date.now()+1,role:'agent',
            agent:data.agent||activeAgent,content:data.response,
            time:new Date().toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'}),
            date:todayISO()};
          setMessagesByAgent(prev=>({...prev,[activeAgent]:[...(prev[activeAgent]||[]),agentMsg]}));
          await fetchPanelData(activeAgent);
          document.getElementById('conn-banner').style.display='none';
        }catch(err){
          const isNet=err instanceof TypeError&&err.message.toLowerCase().includes('fetch');
          const errMsg={id:Date.now()+1,role:'agent',agent:activeAgent,
            content:isNet
              ?`> NETWORK ERROR: Cannot reach backend.\n> Make sure server is running:\n>   python server.py\n> Then visit: http://localhost:8000`
              :`> ERROR: ${err.message}`,
            time:new Date().toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'}),
            date:todayISO()};
          setMessagesByAgent(prev=>({...prev,[activeAgent]:[...(prev[activeAgent]||[]),errMsg]}));
          document.getElementById('conn-banner').style.display='block';
        }finally{setIsLoading(false);}
      }

      async function scanReceipt(file){
        setPendingReceipt(null);
        setIsScanningReceipt(true);
        const imageUrl=URL.createObjectURL(file);
        const time=new Date().toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'});
        const scanMsg={id:Date.now(),role:'agent',agent:'budget',
          content:'> SCANNING RECEIPT...\n> Memproses gambar dengan Pixtral Vision AI...',
          time};
        setMessagesByAgent(prev=>({...prev,budget:[...(prev.budget||[]),scanMsg]}));
        try{
          const formData=new FormData();
          formData.append('file',file);
          const res=await fetch(`${API}/api/budget/scan-receipt`,{method:'POST',body:formData});
          const data=await res.json();
          if(!res.ok)throw new Error(data.detail||'Scan failed');
          setPendingReceipt({...data,imageUrl});
          const doneMsg={id:Date.now()+1,role:'agent',agent:'budget',
            content:'> RECEIPT SCAN COMPLETE!\n> Periksa detail di bawah lalu klik CONFIRM untuk menyimpan.',
            time};
          setMessagesByAgent(prev=>({
            ...prev,
            budget:[...(prev.budget||[]).filter(m=>m.id!==scanMsg.id),doneMsg]
          }));
        }catch(err){
          const errMsg={id:Date.now()+1,role:'agent',agent:'budget',
            content:`> SCAN FAILED: ${err.message}\n> Pastikan foto struk jelas dan coba lagi.`,
            time};
          setMessagesByAgent(prev=>({
            ...prev,
            budget:[...(prev.budget||[]).filter(m=>m.id!==scanMsg.id),errMsg]
          }));
        }finally{setIsScanningReceipt(false);}
      }

              <Avatar id={activeAgent} size={36} AGENTS={AGENTS} SP={SP} T={T}/>
              <div style={{flex:1}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                  <span style={{fontFamily:T.fontPx,fontSize:T.pxFs+4,color:a.color}}>{a.name}</span>
                  <div className="blink" style={{width:6,height:6,background:P.grn,borderRadius:'50%'}}/>
                </div>
                <div style={{fontFamily:T.fontPx,fontSize:T.pxFs-1,color:P.t2}}>{a.desc}</div>
              </div>
              <div style={{display:'flex',gap:5,alignItems:'center'}}>

                    boxShadow:T.shadowMd,
                    marginBottom:4,
                  }}>
                    {group.msgs.map(msg=><Bubble key={msg.id} msg={msg} AGENTS={AGENTS} SP={SP} T={T}/>)}
                  </div>
                </div>
              ))}
              {isLoading&&<TypingIndicator agent={activeAgent} AGENTS={AGENTS} SP={SP} T={T}/>}
              <div ref={bottomRef}/>
            </div>

            {activeAgent==='budget'&&pendingReceipt&&(
              <ReceiptPanel
                receipt={pendingReceipt}
                onConfirm={confirmReceipt}
                onCancel={()=>setPendingReceipt(null)}
                T={T}/>
            )}
            <ChatInput onSend={sendMessage} onReceiptSelect={scanReceipt}
              isLoading={isLoading||isScanningReceipt} activeAgent={activeAgent}
              AGENTS={AGENTS} T={T}/>
          </div>
          <DataPanel activeAgent={activeAgent} data={panelData}
            onQuickAsk={sendMessage} onRefresh={()=>fetchPanelData(activeAgent)}
            AGENTS={AGENTS} T={T}/>

          <ThemeToggle theme={theme} onToggle={()=>setTheme(t=>t==='pixel'?'casual':'pixel')}/>
        </div>
      );
    }

    try{
      ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
    }catch(e){
      const b=document.getElementById('err-banner');
      b.style.display='block';
      b.textContent='REACT RENDER ERROR: '+e.message+'\n'+(e.stack||'');
    }
  </script>
</body>
</html>
