<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CassanovaL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg0:#0a0a0f; --bg1:#111118; --bg2:#1a1a28; --bg3:#252538;
      --bd0:#2a2a40; --bd1:#3a3a55;
      --t0:#e8e8f0;  --t1:#9090b0;  --t2:#505068;
      --grn:#00ff41; --amb:#ffaa00; --blu:#4499ff;
      --prp:#bb44ff; --cyn:#00ffcc; --gld:#ffcc00; --red:#ff2244;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body,#root{width:100%;height:100%;overflow:hidden;image-rendering:pixelated;image-rendering:crisp-edges;}
    body{background:var(--bg0);color:var(--t0);font-family:'VT323',monospace;font-size:18px;}
    body::after{content:'';position:fixed;inset:0;
      background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);
      pointer-events:none;z-index:9999;}
    ::-webkit-scrollbar{width:8px;}
    ::-webkit-scrollbar-track{background:var(--bg1);}
    ::-webkit-scrollbar-thumb{background:var(--bd1);border:2px solid var(--bg1);}
    ::-webkit-scrollbar-thumb:hover{background:var(--t2);}
    .px-btn{font-family:'Press Start 2P',monospace;font-size:8px;border:2px solid;cursor:pointer;
      transition:transform 0.05s,box-shadow 0.05s;}
    .px-btn:hover{transform:translate(-1px,-1px);box-shadow:3px 3px 0 0 rgba(0,0,0,.6);}
    .px-btn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 0 rgba(0,0,0,.6);}
    .px-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none;}
    .px-stat{background:var(--bg2);border:2px solid var(--bd0);box-shadow:2px 2px 0 0 rgba(0,0,0,.5);padding:10px 12px;}
    .px-label{font-family:'Press Start 2P',monospace;font-size:6px;letter-spacing:.1em;text-transform:uppercase;color:var(--t2);}
    .px-tag{font-family:'Press Start 2P',monospace;font-size:6px;padding:3px 6px;border:1px solid;}
    .quick-btn{font-family:'VT323',monospace;font-size:16px;padding:6px 10px;border:2px solid;
      cursor:pointer;text-align:left;width:100%;background:transparent;
      transition:filter .05s,transform .05s steps(1);}
    .quick-btn:hover{filter:brightness(1.4);transform:translateX(3px);}
    .agent-nav-item{transition:transform .1s steps(2);}
    .agent-nav-item:hover{transform:translateY(-3px);}
    .dither-bg{background-image:radial-gradient(circle,rgba(255,255,255,.025) 1px,transparent 1px);background-size:4px 4px;}
    .blink{animation:blink 1s step-end infinite;}
    @keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
    .type-dot{animation:tdot 1.2s step-end infinite;}
    .type-dot:nth-child(2){animation-delay:.4s;}
    .type-dot:nth-child(3){animation-delay:.8s;}
    @keyframes tdot{0%,66%,100%{opacity:0;}33%{opacity:1;}}
    .msg-in{animation:msgIn .1s steps(3) both;}
    @keyframes msgIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
    .msg-content pre{background:#080810;border:2px solid var(--bd0);border-left:4px solid var(--prp);
      padding:12px;overflow-x:auto;font-family:'VT323',monospace;font-size:16px;line-height:1.5;
      margin:8px 0;box-shadow:2px 2px 0 0 rgba(0,0,0,.5);}
    .msg-content code{background:var(--bg2);border:1px solid var(--bd0);padding:1px 6px;
      font-family:'VT323',monospace;font-size:16px;color:var(--cyn);}
    .msg-content ul{padding-left:20px;margin:6px 0;list-style:square;}
    .msg-content li{margin:4px 0;}
    .msg-content strong{color:var(--gld);}
    .msg-content p{margin:4px 0;line-height:1.5;}
    #conn-banner{
      position:fixed;top:0;left:0;right:0;z-index:99999;
      background:#ff2244;border-bottom:3px solid #ff6666;
      font-family:'Press Start 2P',monospace;font-size:8px;
      color:#fff;text-align:center;padding:10px;
      display:none;line-height:2;
    }
  </style>
</head>

    window.onerror = function(msg, src, line, col, err) {
      var b = document.getElementById('err-banner');
      b.style.display = 'block';
      b.textContent = 'JS ERROR: ' + msg + '\nat ' + src + ':' + line + ':' + col;
    };
    window.onunhandledrejection = function(e) {
      var b = document.getElementById('err-banner');
      b.style.display = 'block';
      b.textContent = 'UNHANDLED PROMISE: ' + (e.reason && (e.reason.message || e.reason));
    };

    function renderContent(text) {
      if (text === null || text === undefined || text === '') return null;
      if (typeof text !== 'string') text = String(text);
      const blocks = text.split(/(```[\s\S]*?```)/g);
      return blocks.map((block, i) => {
        if (!block) return null;
        if (block.startsWith('```') && block.endsWith('```')) {
          const inner = block.slice(3,-3).replace(/^[a-z]+\n/,'');
          return <pre key={i}>{inner}</pre>;
        }
        const lines = block.split('\n');
        return (
          <span key={i}>
            {lines.map((line,j) => {
              const parts = line.split(/(\*\*[^*]+\*\*|`[^`]+`)/g);
              return (
                <React.Fragment key={j}>
                  {parts.map((p,k) => {
                    if (p.startsWith('**') && p.endsWith('**')) return <strong key={k}>{p.slice(2,-2)}</strong>;
                    if (p.startsWith('`') && p.endsWith('`')) return <code key={k}>{p.slice(1,-1)}</code>;
                    return p;
                  })}
                  {j < lines.length-1 && <br/>}
                </React.Fragment>
              );
            })}
          </span>
        );
      });
    }

            <div style={{ display:'flex', gap:4, justifyContent:'center' }}>
              {AGENT_ORDER.map(id => (
                <div key={id} style={{ width:8, height:8,
                  background: activeAgent===id ? AGENTS[id].color : P.bd0,
                  boxShadow: activeAgent===id ? `0 0 6px ${AGENTS[id].color}` : 'none' }}/>
              ))}
            </div>
          </div>
        </aside>
      );
    }

    function todayISO() { return new Date().toISOString().slice(0,10); }

    function groupByDate(msgs) {
      const groups = [];
      for (const msg of msgs) {
        const d = msg.date || todayISO();
        if (!groups.length || groups[groups.length-1].date !== d) {
          groups.push({ date: d, msgs: [msg] });
        } else {
          groups[groups.length-1].msgs.push(msg);
        }
      }
      return groups;
    }

    function formatDateLabel(iso) {
      const today = todayISO();
      const yesterday = new Date(Date.now()-86400000).toISOString().slice(0,10);
      if (iso === today) return 'HARI INI';
      if (iso === yesterday) return 'KEMARIN';
      const d = new Date(iso + 'T00:00:00');
      return d.toLocaleDateString('id-ID',{weekday:'short',day:'2-digit',month:'short',year:'numeric'}).toUpperCase();
    }

    function App() {
      const [activeAgent, setActiveAgent] = useState('task');
      const [messagesByAgent, setMessagesByAgent] = useState(() => {
        const init = {};
        AGENT_ORDER.forEach(id => {
          init[id] = [{
            id: Date.now()+id, role:'agent', agent:id,
            content: AGENTS[id].greeting,
            time: new Date().toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'}),
            date: todayISO(),
          }];
        });
        return init;
      });
      const [isLoading, setIsLoading] = useState(false);
      const [panelData, setPanelData] = useState({tasks:{},notes:{},budget:{}});
      const [pendingReceipt, setPendingReceipt] = useState(null);
      const [isScanningReceipt, setIsScanningReceipt] = useState(false);
      const bottomRef = useRef(null);
      const messages = messagesByAgent[activeAgent] || [];

      useEffect(() => { bottomRef.current?.scrollIntoView({behavior:'smooth'}); }, [messages, isLoading]);

      const fetchPanelData = useCallback(async (agent) => {
        try {
          if (agent==='task') {
            const d = await (await fetch(`${API}/api/tasks`)).json();
            setPanelData(p => ({...p, tasks:d}));
          } else if (agent==='notes') {
            const d = await (await fetch(`${API}/api/notes`)).json();
            setPanelData(p => ({...p, notes:d}));
          } else if (agent==='budget') {
            const d = await (await fetch(`${API}/api/budget/summary`)).json();
            setPanelData(p => ({...p, budget:d}));
          }
        } catch(e) { console.error('Panel fetch failed:', e); }
      }, []);

      useEffect(() => { fetchPanelData(activeAgent); }, [activeAgent, fetchPanelData]);

      async function sendMessage(text) {
        if (isLoading) return;
        const userMsg = { id:Date.now(), role:'user', content:text,
          time:new Date().toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'}),
          date:todayISO() };
        setMessagesByAgent(prev => ({...prev, [activeAgent]:[...(prev[activeAgent]||[]), userMsg]}));
        setIsLoading(true);
        try {
          const res = await fetch(`${API}/api/chat`, {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({message:text, agent:activeAgent}),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || 'Server error');
          const agentMsg = { id:Date.now()+1, role:'agent',
            agent:data.agent||activeAgent, content:data.response,
            time:new Date().toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'}),
            date:todayISO() };
          setMessagesByAgent(prev => ({...prev, [activeAgent]:[...(prev[activeAgent]||[]), agentMsg]}));
          await fetchPanelData(activeAgent);
          document.getElementById('conn-banner').style.display = 'none';
        } catch(err) {
          const isNet = err instanceof TypeError && err.message.toLowerCase().includes('fetch');
          const errMsg = { id:Date.now()+1, role:'agent', agent:activeAgent,
            content: isNet
              ? `> NETWORK ERROR: Cannot reach backend.\n> Make sure server is running:\n>   python server.py\n> Then visit: http://localhost:8000`
              : `> ERROR: ${err.message}`,
            time:new Date().toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'}),
            date:todayISO() };
          setMessagesByAgent(prev => ({...prev, [activeAgent]:[...(prev[activeAgent]||[]), errMsg]}));
          document.getElementById('conn-banner').style.display = 'block';
        } finally { setIsLoading(false); }
      }

      async function scanReceipt(file) {
        setPendingReceipt(null);
        setIsScanningReceipt(true);
        const imageUrl = URL.createObjectURL(file);
        const time = new Date().toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'});
        // Show scanning message in chat
        const scanMsg = { id: Date.now(), role:'agent', agent:'budget',
          content:'> SCANNING RECEIPT...\n> Memproses gambar dengan Pixtral Vision AI...',
          time };
        setMessagesByAgent(prev => ({...prev, budget:[...(prev.budget||[]), scanMsg]}));
        try {
          const formData = new FormData();
          formData.append('file', file);
          const res = await fetch(`${API}/api/budget/scan-receipt`, { method:'POST', body:formData });
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || 'Scan failed');
          setPendingReceipt({ ...data, imageUrl });
          // Replace scan message with result prompt
          const doneMsg = { id: Date.now()+1, role:'agent', agent:'budget',
            content:'> RECEIPT SCAN COMPLETE!\n> Periksa detail di bawah lalu klik CONFIRM untuk menyimpan.',
            time };
          setMessagesByAgent(prev => ({
            ...prev,
            budget: [...(prev.budget||[]).filter(m => m.id !== scanMsg.id), doneMsg]
          }));
        } catch(err) {
          const errMsg = { id: Date.now()+1, role:'agent', agent:'budget',
            content:`> SCAN FAILED: ${err.message}\n> Pastikan foto struk jelas dan coba lagi.`,
            time };
          setMessagesByAgent(prev => ({
            ...prev,
            budget: [...(prev.budget||[]).filter(m => m.id !== scanMsg.id), errMsg]
          }));
        } finally { setIsScanningReceipt(false); }
      }

      function confirmReceipt() {
        if (!pendingReceipt) return;
        const r = pendingReceipt;
        const msg = `Tambah ${r.type === 'income' ? 'pemasukan' : 'pengeluaran'}: ${r.amount} kategori ${r.category} deskripsi "${r.description}" tanggal ${r.date}`;
        setPendingReceipt(null);
        sendMessage(msg);
      }

      const a = AGENTS[activeAgent];
      return (
        <div style={{ display:'flex', height:'100vh', overflow:'hidden', background:P.bg0 }}>
          <Sidebar active={activeAgent} onSelect={setActiveAgent}/>
          <div style={{ flex:1, display:'flex', flexDirection:'column', minWidth:0, overflow:'hidden' }}>
            <div className="dither-bg" style={{ padding:'10px 16px',
              borderBottom:`2px solid ${P.bd0}`, background:P.bg1,
              display:'flex', alignItems:'center', gap:12, flexShrink:0,
              boxShadow:`0 2px 0 0 ${P.bd1}` }}>
              <Avatar id={activeAgent} size={36}/>
              <div style={{ flex:1 }}>
                <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:4 }}>
                  <span style={{ fontFamily:"'Press Start 2P',monospace", fontSize:10, color:a.color }}>{a.name}</span>
                  <div className="blink" style={{ width:6, height:6, background:P.grn }}/>
                </div>
                <div style={{ fontFamily:"'Press Start 2P',monospace", fontSize:5, color:P.t2 }}>{a.desc}</div>
              </div>
              <div style={{ display:'flex', gap:5 }}>
                {AGENT_ORDER.map(id => (
                  <button key={id} onClick={() => setActiveAgent(id)} title={AGENTS[id].name}
                    style={{ width:10, height:10, border:'none', cursor:'pointer',
                      background: activeAgent===id ? AGENTS[id].color : P.bd0,
                      boxShadow: activeAgent===id ? `0 0 6px ${AGENTS[id].color}` : 'none' }}/>
                ))}
              </div>
            </div>
            <div style={{ flex:1, overflowY:'auto', padding:'16px', background:P.bg0 }}>
              {groupByDate(messages).map((group, gi) => (
                <div key={group.date}>
                  {/* ── Date separator ── */}
                  <div style={{ display:'flex', alignItems:'center', gap:8, margin:`${gi===0?0:18}px 0 10px` }}>
                    <div style={{ flex:1, height:1, background:P.bd1 }}/>
                    <span style={{ fontFamily:"'Press Start 2P',monospace", fontSize:5,
                      color:P.t2, padding:'3px 10px',
                      border:`1px solid ${P.bd1}`, background:P.bg0,
                      letterSpacing:'.12em' }}>
                      {formatDateLabel(group.date)}
                    </span>
                    <div style={{ flex:1, height:1, background:P.bd1 }}/>
                  </div>
                  {/* ── Day box ── */}
                  <div style={{
                    border:`2px solid ${P.bd0}`,
                    borderTop:`3px solid ${AGENTS[activeAgent].dark}`,
                    background:P.bg1,
                    padding:'10px 8px 6px',
                    boxShadow:`3px 3px 0 0 rgba(0,0,0,.35)`,
                    marginBottom:4,
                  }}>
                    {group.msgs.map(msg => <Bubble key={msg.id} msg={msg}/>)}
                  </div>
                </div>
              ))}
              {isLoading && <TypingIndicator agent={activeAgent}/>}
              <div ref={bottomRef}/>
            </div>
            {activeAgent === 'budget' && pendingReceipt && (
              <ReceiptPanel
                receipt={pendingReceipt}
                onConfirm={confirmReceipt}
                onCancel={() => setPendingReceipt(null)}
                activeAgent={activeAgent}/>
            )}
            <ChatInput onSend={sendMessage} onReceiptSelect={scanReceipt}
              isLoading={isLoading || isScanningReceipt} activeAgent={activeAgent}/>
          </div>
          <DataPanel activeAgent={activeAgent} data={panelData}
            onQuickAsk={sendMessage} onRefresh={() => fetchPanelData(activeAgent)}/>
        </div>
      );
    }

    try {
      ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
    } catch(e) {
      const b = document.getElementById('err-banner');
      b.style.display = 'block';
      b.textContent = 'REACT RENDER ERROR: ' + e.message + '\n' + (e.stack||'');
    }
  </script>
</body>
</html>
